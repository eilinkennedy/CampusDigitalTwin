<!DOCTYPE html>
<html>
<head>
    <title>Campus Digital Twin Dashboard</title>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta http-equiv="refresh" content="10">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: left;
        }

        .status {
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
        }

        .status.normal {
            color: #166534;
            background: #dcfce7;
        }

        .status.crowded {
            color: #7f1d1d;
            background: #fee2e2;
        }

        .status.empty {
            color: #374151;
            background: #e5e7eb;
        }

        .progress-track {
            background: #e5e7eb;
            height: 10px;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 6px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            transition: width 0.6s ease;
        }

        .progress-fill.normal {
            background: #22c55e;
        }

        .progress-fill.crowded {
            background: #ef4444;
        }

        .progress-fill.empty {
            background: #9ca3af;
        }

        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: 90%;
            margin: auto;
        }
    </style>
</head>

<body>

<h1>🏫 Campus Building Occupancy Dashboard</h1>

<h2>🏢 Building Real-time Status</h2>

<div class="cards">
{% for building in buildings %}
    <div class="card">

        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>{{ building.name }}</h3>
            <span class="status {{ building.status }}">
                {{ building.status|upper }}
            </span>
        </div>

        <p>
            Occupancy: <b>{{ building.occupancy }}</b> / {{ building.capacity }}
        </p>

        <!-- PROGRESS BAR -->
        <div class="progress-track">
            <div
                class="progress-fill {{ building.status }}"
                data-percent="{{ building.percent }}">
            </div>
        </div>

    </div>
{% endfor %}
</div>

<!-- CHART -->
<div class="chart-container">
    <canvas id="occupancyChart"></canvas>
</div>

{{ chart_data|json_script:"chart-data" }}

<script>
    // Apply progress bar widths safely
    document.querySelectorAll('.progress-fill').forEach(bar => {
        const percent = bar.dataset.percent || 0;
        bar.style.width = percent + '%';
    });

    const chartData = JSON.parse(
        document.getElementById('chart-data').textContent
    );

    const ctx = document.getElementById('occupancyChart').getContext('2d');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: chartData.labels,
            datasets: [
                {
                    label: 'Occupancy',
                    data: chartData.occupancy,
                },
                {
                    label: 'Capacity',
                    data: chartData.capacity,
                }
            ]
        },
        options: {
            responsive: true,
            plugins: {
                title: {
                    display: true,
                    text: 'Occupancy vs Capacity'
                }
            }
        }
    });
</script>

</body>
</html>
