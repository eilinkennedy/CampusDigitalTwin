{% extends "admin_base.html" %}

{% block content %}
<section class="mx-auto max-w-3xl rounded-[2rem] border border-white/70 bg-white/85 p-8 shadow-panel backdrop-blur-md md:p-10">
    <p class="text-sm font-semibold uppercase tracking-[0.16em] text-red-500">Delete Record</p>
    <h1 class="mt-2 text-4xl font-extrabold text-forest-green">Delete {{ config.title }}</h1>
    <p class="mt-4 text-base leading-7 text-slate-600">{{ section_description }}</p>
    <div class="mt-8 rounded-2xl border border-red-200 bg-red-50 px-5 py-4 text-sm text-red-700">
        You are about to delete: <span class="font-semibold">{{ object }}</span>
    </div>
    <form method="post" class="mt-8 flex flex-wrap gap-3">
        {% csrf_token %}
        <button class="rounded-full bg-red-600 px-6 py-3 text-sm font-semibold text-white transition hover:bg-red-700" type="submit">Delete {{ config.title }}</button>
        <a href="{% url 'admin_model_list' model_key=model_key %}" class="rounded-full border border-slate-200 px-6 py-3 text-sm font-semibold text-slate-700 transition hover:border-primary hover:text-primary">Cancel</a>
    </form>
</section>
{% endblock %}
