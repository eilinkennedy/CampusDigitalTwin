<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <title>SJCET Digital Twin – Dashboard</title>

    <!-- Auto refresh every 15 seconds -->
    <meta http-equiv="refresh" content="15">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- Tailwind Custom Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#11d442",
                        bgLight: "#f6f8f6"
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-bgLight min-h-screen flex">

<!-- SIDEBAR -->
<aside class="w-64 bg-white border-r">
    <div class="p-6 flex items-center gap-3">
        <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center text-white">
            <span class="material-icons">lan</span>
        </div>
        <h2 class="font-bold text-xl">SJCET Twin</h2>
    </div>
</aside>

<!-- MAIN CONTENT -->
<main class="flex-1 p-8 overflow-y-auto">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold">Building Occupancy Dashboard</h1>

        <!-- TIME PHASE -->
        <div class="px-4 py-2 rounded-full bg-white border text-sm font-semibold text-slate-600">
            Current Phase:
            <span class="ml-1 text-primary font-bold">
                {{ time_phase }}
            </span>
        </div>
    </div>

    <!-- BUILDING CARDS -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">

        {% for b in buildings %}
        <div class="bg-white p-5 rounded-xl border {{ b.border_class }}">

            <div class="flex justify-between mb-3">
                <h4 class="font-bold">{{ b.name }}</h4>
                <span class="px-2 py-1 rounded-full text-[10px] font-bold {{ b.badge_class }}">
                    {{ b.status }}
                </span>
            </div>

            <div class="text-xs font-medium mb-1 {{ b.text_class }}">
                {{ b.occupancy }} / {{ b.capacity }}
            </div>

            <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                <div class="h-full rounded-full {{ b.bar_class }} {{ b.width_class }}"></div>
            </div>

        </div>
        {% endfor %}

    </div>

</main>

</body>
</html>
