{% extends "admin_base.html" %}

{% block content %}
<section class="mb-8 rounded-[2rem] border border-white/70 bg-white/80 p-8 shadow-panel backdrop-blur-md md:p-10">
    <span class="inline-flex rounded-full bg-primary/10 px-4 py-1.5 text-sm font-semibold uppercase tracking-[0.18em] text-primary">Administration</span>
    <h1 class="mt-5 text-4xl font-extrabold text-forest-green md:text-5xl">Admin Dashboard</h1>
</section>

<section class="grid gap-6 md:grid-cols-3">
    {% for module in modules %}
    <a href="{{ module.href }}" class="group rounded-[1.75rem] border border-slate-200 bg-white p-7 shadow-sm transition duration-300 hover:-translate-y-1 hover:shadow-panel">
        <div class="flex h-14 w-14 items-center justify-center rounded-2xl bg-sage-green text-primary">
            <span class="material-icons text-3xl">{{ module.icon }}</span>
        </div>
        <h2 class="mt-6 text-2xl font-bold text-forest-green">{{ module.title }}</h2>
        <p class="mt-3 text-sm leading-6 text-slate-600">{{ module.description }}</p>
        <p class="mt-6 text-sm font-semibold text-primary">Open module</p>
    </a>
    {% endfor %}
</section>
{% endblock %}
